<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Баннер FreeCapital — Займ для бизнеса</title>
<style>
  /* === PAGE PREVIEW === */
  body {
    margin: 0;
    padding: 40px 20px;
    background: #e8eaed;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .preview-label {
    color: #555;
    font-size: 13px;
    font-weight: 500;
    margin: 0;
  }
  .preview-wrap {
    width: 100%;
    max-width: 1215px;
    resize: horizontal;
    overflow: hidden;
    min-width: 280px;
    border: 1px dashed #bbb;
    container-type: inline-size;
  }

  /* === BANNER === */
  .fc-banner {
    display: block;
    text-decoration: none;
    color: inherit;
    position: relative;
    width: 100%;
    height: 240px;
    background: #E0EA89;
    border-radius: 4px;
    overflow: hidden;
    box-sizing: border-box;
    cursor: pointer;
  }
  .fc-banner * { box-sizing: border-box; }

  /* --- Top row --- */
  .fc-top {
    position: absolute;
    top: 20px;
    left: 24px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }
  .fc-logo {
    flex-shrink: 0;
    height: 38px;
  }
  .fc-logo img { height: 38px; width: auto; display: block; }

  .fc-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .fc-tags img {
    height: 27px;
    width: auto;
    display: block;
  }

  .fc-ad {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 12px;
    color: rgba(0,0,0,0.35);
    z-index: 2;
  }

  /* --- Headline --- */
  .fc-headline {
    position: absolute;
    top: 72px;
    left: 24px;
    z-index: 2;
  }
  .fc-headline img {
    height: 42px;
    width: auto;
    display: block;
  }

  /* --- CTA row --- */
  .fc-cta-row {
    position: absolute;
    top: 130px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 2;
  }
  .fc-subtitle img {
    height: 19px;
    width: auto;
    display: block;
  }
  .fc-cta img {
    height: 47px;
    width: auto;
    display: block;
    transition: transform 0.15s ease;
  }
  .fc-banner:hover .fc-cta img {
    transform: scale(1.03);
  }

  /* --- Disclaimer --- */
  .fc-disclaimer {
    position: absolute;
    bottom: 12px;
    left: 24px;
    z-index: 2;
    max-width: 60%;
  }
  .fc-disclaimer img {
    width: 100%;
    height: auto;
    display: block;
    max-height: 24px;
  }

  /* --- Illustration --- */
  .fc-bag {
    position: absolute;
    right: 40px;
    bottom: 0;
    z-index: 1;
    height: 200px;
    width: auto;
  }
  .fc-money {
    position: absolute;
    z-index: 0;
  }
  .fc-money--1 {
    right: 220px;
    top: 10px;
    width: 60px;
    transform: rotate(-10deg);
    animation: floatMoney 3s ease-in-out infinite;
  }
  .fc-money--2 {
    right: 10px;
    top: 30px;
    width: 55px;
    transform: rotate(15deg);
    animation: floatMoney 3s 0.5s ease-in-out infinite;
  }
  .fc-money--3 {
    right: 180px;
    bottom: 20px;
    width: 50px;
    transform: rotate(5deg);
    animation: floatMoney 3s 1s ease-in-out infinite;
  }

  /* === Container query responsive === */
  @container (max-width: 900px) {
    .fc-bag { height: 170px; right: 20px; }
    .fc-money--1 { right: 170px; width: 50px; }
    .fc-money--2 { right: 0; width: 45px; }
    .fc-money--3 { right: 140px; width: 42px; }
  }

  @container (max-width: 700px) {
    .fc-headline img { height: 34px; }
    .fc-headline { top: 68px; }
    .fc-cta-row { top: 115px; gap: 14px; }
    .fc-cta img { height: 40px; }
    .fc-subtitle img { height: 16px; }
    .fc-bag { height: 145px; right: 10px; }
    .fc-money--1 { right: 130px; width: 42px; }
    .fc-money--2 { width: 38px; }
    .fc-money--3 { right: 110px; width: 36px; }
    .fc-tags img:nth-child(3) { display: none; }
    .fc-disclaimer { max-width: 55%; }
  }

  @container (max-width: 520px) {
    .fc-top { gap: 8px; right: 60px; }
    .fc-logo img { height: 30px; }
    .fc-tags { display: none; }
    .fc-ad { font-size: 11px; }
    .fc-headline { top: 60px; left: 18px; }
    .fc-headline img { height: 28px; }
    .fc-cta-row { top: 100px; left: 18px; gap: 12px; flex-direction: column; align-items: flex-start; }
    .fc-subtitle img { height: 14px; }
    .fc-cta img { height: 36px; }
    .fc-bag { height: 120px; right: 5px; }
    .fc-money--1 { right: 100px; width: 34px; top: 20px; }
    .fc-money--2 { width: 30px; top: 40px; }
    .fc-money--3 { display: none; }
    .fc-disclaimer { left: 18px; max-width: 50%; }
    .fc-disclaimer img { max-height: 20px; }
  }

  @container (max-width: 360px) {
    .fc-headline img { height: 24px; }
    .fc-cta-row { top: 92px; }
    .fc-cta img { height: 32px; }
    .fc-bag { height: 100px; right: 0; }
    .fc-money--1 { display: none; }
    .fc-disclaimer { max-width: 48%; }
    .fc-disclaimer img { max-height: 18px; }
  }

  /* === Animations === */
  .fc-top { animation: fadeIn 0.4s ease both; }
  .fc-headline { animation: fadeIn 0.4s 0.15s ease both; }
  .fc-cta-row { animation: fadeIn 0.4s 0.25s ease both; }
  .fc-bag { animation: slideIn 0.5s 0.2s ease both; }
  .fc-money { animation: slideIn 0.5s 0.1s ease both; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes floatMoney {
    0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
    50% { transform: translateY(-6px) rotate(var(--rot, 0deg)); }
  }
</style>
</head>
<body>

<p class="preview-label">Резиновый баннер 280–1215px &times; 240px (потяните за правый край)</p>

<div class="preview-wrap">
<a href="https://freecapital.ru" target="_blank" class="fc-banner">

  <!-- Top: logo + tags -->
  <div class="fc-top">
    <div class="fc-logo">
      <img src="assets/banner/logo.svg" alt="FreeCapital">
    </div>
    <div class="fc-tags">
      <img src="assets/banner/tag-ip.svg" alt="ИП и ООО">
      <img src="assets/banner/tag-srok.svg" alt="Срок регистрации бизнеса от 3 месяцев">
      <img src="assets/banner/tag-online.svg" alt="Подача онлайн">
    </div>
  </div>
  <span class="fc-ad">Реклама</span>

  <!-- Headline -->
  <div class="fc-headline">
    <img src="assets/banner/headline.svg" alt="Займ для бизнеса">
  </div>

  <!-- CTA row -->
  <div class="fc-cta-row">
    <div class="fc-subtitle">
      <img src="assets/banner/subtitle.svg" alt="На любые цели">
    </div>
    <div class="fc-cta">
      <img src="assets/banner/btn_48_blue.svg" alt="Подать заявку">
    </div>
  </div>

  <!-- Disclaimer -->
  <div class="fc-disclaimer">
    <img src="assets/banner/disclaimer.svg" alt="Условия займа на сайте freecapital.ru">
  </div>

  <!-- Illustration -->
  <img class="fc-money fc-money--1" src="assets/banner/money1.png" alt="">
  <img class="fc-money fc-money--2" src="assets/banner/money2.png" alt="">
  <img class="fc-money fc-money--3" src="assets/banner/money3.png" alt="">
  <img class="fc-bag" src="assets/banner/bag.png" alt="">

</a>
</div>

</body>
</html>
